name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run '/orb-setup'
        2. Do something else
        3. See error
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: What version of Node.js are you running?
      placeholder: "e.g., 20.11.0"
    validations:
      required: true
  - type: input
    id: claude-version
    attributes:
      label: Claude Code version
      description: What version of Claude Code are you using?
      placeholder: "e.g., 0.2.45"
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you using?
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code.
      render: shell
    validations:
      required: false
